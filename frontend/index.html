<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManaMurah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🔍 ManaMurah</h1>
        <p id="subtitle">Cari barang termurah di Shopee, Lazada, TikTok Shop & Lain-lain!</p>
        <button id="langToggle">EN</button>
        <button id="darkModeToggle">🌙</button>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cth: power bank, kasut, blender...">
        <input type="number" id="maxPriceInput" placeholder="Max RM" min="0" step="1">
        <select id="sortSelect">
            <option value="asc">Harga: Rendah → Tinggi</option>
            <option value="desc">Harga: Tinggi → Rendah</option>
            <option value="relevance" selected>Relevan</option>
        </select>
        <button id="searchBtn">Cari</button>
    </div>

    <div id="summary" class="summary hidden"></div>
    <div id="results" class="results-grid"></div>
    <div id="loading" class="hidden">Mencari harga terbaik...</div>

    <script src="app.js"></script>
</body>
</html>
